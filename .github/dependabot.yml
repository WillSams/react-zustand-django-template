version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: main

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main

  - package-ecosystem: npm
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main

  - package-ecosystem: terraform
    directory: "/.infrastructure"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: main
