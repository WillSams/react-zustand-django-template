name: Deployment (ECR, ECS)
on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:  # manual triggering
    inputs:
      environment:
        type: choice
        description: Environment to deploy to
        options:
        - demo
        - staging
        - prod

env:
  DEPLOYMENT_ENV: ${{ github.event.inputs.environment || 'demo' }}
  REGISTRY: ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  APP_IMAGE: react-zustand-django-template
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image to ECR
      env:
        REMOTE_IMAGE: ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}
        IMAGE_TAG: ${{ github.sha }}
        LATEST_PREFIX: ${{ env.DEPLOYMENT_ENV != 'prod' && env.DEPLOYMENT_ENV || '' }}
      run: |
        docker build -f backend/Dockerfile -t $REMOTE_IMAGE:$IMAGE_TAG .
        docker tag $REMOTE_IMAGE:$IMAGE_TAG $REMOTE_IMAGE:$LATEST_PREFIX-latest
        docker push --all-tags $REMOTE_IMAGE

    - name: Deploy to ECS
      if: success()
      run: |
        aws ecs update-service \
          --cluster $DEPLOYMENT_ENV-react-zustand-django-template-cluster \
          --service $DEPLOYMENT_ENV-react-zustand-django-template-service \
          --force-new-deployment \
          --region $AWS_REGION
